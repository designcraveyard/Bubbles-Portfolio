<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation App - Active Session</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* macOS-like scrollbars */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.0);border-radius:3px;transition:background .3s}
  :hover::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.4)}
  *{scrollbar-width:thin;scrollbar-color:transparent transparent}
  *:hover{scrollbar-color:rgba(128,128,128,.25) transparent}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080E17;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
}
.phone {
  width: 390px;
  height: 844px;
  background: linear-gradient(165deg, #0D1B2A 0%, #112B3C 40%, #1B4332 100%);
  border-radius: 44px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(27,67,50,0.3), 0 0 160px rgba(13,27,42,0.4);
}
.particles { position: absolute; inset: 0; pointer-events: none; }
.particle {
  position: absolute;
  width: var(--size);
  height: var(--size);
  background: radial-gradient(circle, rgba(100,220,200,0.6), transparent 70%);
  border-radius: 50%;
  animation: floatUp var(--dur) var(--delay) linear infinite;
  left: var(--x);
  bottom: -10px;
  opacity: 0;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateX(0) translateY(0); }
  10% { opacity: var(--op); }
  90% { opacity: var(--op); }
  100% { opacity: 0; transform: translateX(var(--drift)) translateY(-844px); }
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px 28px 0;
  position: relative;
  z-index: 2;
}
.close-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.close-btn svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.7); stroke-width: 2; }
.streak {
  font-size: 14px;
  font-weight: 500;
  color: #F4A261;
  background: rgba(244,162,97,0.1);
  backdrop-filter: blur(10px);
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(244,162,97,0.15);
}

/* Title */
.session-info {
  text-align: center;
  padding: 36px 28px 0;
  position: relative;
  z-index: 2;
}
.session-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: #fff;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.session-sub {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.5px;
}

/* Breathing circle */
.breathing-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 48px;
  position: relative;
  z-index: 2;
}
.breath-container {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.breath-ring {
  position: absolute;
  border-radius: 50%;
  animation: breathe 10s ease-in-out infinite;
}
.breath-ring.outer {
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(100,200,180,0.08), rgba(100,200,180,0.02));
  border: 1px solid rgba(100,200,180,0.06);
}
.breath-ring.middle {
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(100,210,185,0.2), rgba(100,210,185,0.05));
  border: 1px solid rgba(100,210,185,0.1);
  animation-delay: -0.15s;
}
.breath-ring.inner {
  width: 100px; height: 100px;
  background: radial-gradient(circle at 40% 40%, rgba(120,230,200,0.6), rgba(80,180,160,0.3));
  box-shadow: 0 0 40px rgba(100,220,190,0.25), 0 0 80px rgba(100,220,190,0.1), inset 0 0 20px rgba(255,255,255,0.1);
  animation-delay: -0.3s;
}
@keyframes breathe {
  0%   { transform: scale(0.75); }  /* exhaled */
  40%  { transform: scale(1.0); }   /* inhaled */
  60%  { transform: scale(1.0); }   /* hold */
  100% { transform: scale(0.75); }  /* exhaled */
}

/* Ripple rings */
.ripple {
  position: absolute;
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 1px solid rgba(100,220,190,0.2);
  animation: rippleOut 4s ease-out infinite;
}
.ripple:nth-child(2) { animation-delay: 1.33s; }
.ripple:nth-child(3) { animation-delay: 2.66s; }
@keyframes rippleOut {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(3.2); opacity: 0; }
}

/* Breath text */
.breath-text {
  margin-top: 32px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  letter-spacing: 2px;
  animation: breathTextCycle 10s ease-in-out infinite;
}
@keyframes breathTextCycle {
  0%, 5%    { opacity: 0.4; }
  10%, 35%  { opacity: 1; }
  40%, 55%  { opacity: 0.7; }
  60%, 65%  { opacity: 0.4; }
  70%, 95%  { opacity: 1; }
  100%      { opacity: 0.4; }
}

/* Timer */
.timer-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 36px;
  position: relative;
  z-index: 2;
}
.timer-ring-wrap {
  position: relative;
  width: 72px; height: 72px;
}
.timer-ring-wrap svg {
  transform: rotate(-90deg);
  width: 72px; height: 72px;
}
.timer-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 2; }
.timer-ring-fg {
  fill: none;
  stroke: url(#timerGrad);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 201;
  stroke-dashoffset: 68; /* ~34% elapsed */
}
.timer-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.3px;
}
.timer-label {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  margin-top: 40px;
  position: relative;
  z-index: 2;
}
.ctrl-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.ctrl-btn:hover { opacity: 0.8; }
.ctrl-btn svg { width: 22px; height: 22px; fill: #fff; }
.ctrl-btn.pause {
  width: 64px; height: 64px;
  background: rgba(100,220,190,0.15);
  border: 1px solid rgba(100,220,190,0.2);
  border-radius: 50%;
  opacity: 1;
  backdrop-filter: blur(10px);
}
.ctrl-btn.pause svg { width: 26px; height: 26px; fill: rgba(160,240,220,0.9); }

/* Secondary controls */
.secondary-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  margin-top: 24px;
  position: relative;
  z-index: 2;
}
.sec-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; opacity: 0.35;
}
.sec-btn svg { width: 20px; height: 20px; fill: #fff; }
.sec-btn span { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }

/* Progress bar */
.progress-bar {
  position: absolute;
  bottom: 36px;
  left: 28px;
  right: 28px;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  z-index: 2;
}
.progress-fill {
  height: 100%;
  width: 65%;
  background: linear-gradient(90deg, rgba(100,220,190,0.6), rgba(255,255,255,0.4));
  border-radius: 2px;
}

/* Ambient glow */
.glow-1 {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(27,67,50,0.4), transparent 70%);
  top: 30%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
  animation: glowPulse 10s ease-in-out infinite;
}
.glow-2 {
  position: absolute;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(13,27,42,0.5), transparent 70%);
  bottom: 15%; left: 30%;
  pointer-events: none;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  60% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
}
</style>
</head>
<body>

<div class="phone">
  <!-- Ambient glows -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="close-btn">
      <svg viewBox="0 0 24 24" fill="none"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </div>
    <div class="streak">Day 12 Streak <i data-lucide="flame" style="width:16px;height:16px;display:inline;vertical-align:middle;color:#F4A261;"></i></div>
  </div>

  <!-- Session info -->
  <div class="session-info">
    <div class="session-name">Morning Clarity</div>
    <div class="session-sub">Focus & Breathe &middot; 10 min</div>
  </div>

  <!-- Breathing circle -->
  <div class="breathing-area">
    <div class="breath-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="breath-ring outer"></div>
      <div class="breath-ring middle"></div>
      <div class="breath-ring inner"></div>
    </div>
    <div class="breath-text" id="breathText">Breathe In...</div>
  </div>

  <!-- Timer -->
  <div class="timer-area">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 72 72">
        <defs>
          <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(100,220,190,0.7)"/>
            <stop offset="100%" stop-color="rgba(200,255,240,0.5)"/>
          </linearGradient>
        </defs>
        <circle class="timer-ring-bg" cx="36" cy="36" r="32"/>
        <circle class="timer-ring-fg" cx="36" cy="36" r="32"/>
      </svg>
      <div class="timer-text">06:32</div>
    </div>
    <div class="timer-label">remaining</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl-btn">
      <svg viewBox="0 0 24 24"><path d="M12.066 11.2l4.934-3.2v8l-4.934-3.2L7 16V8l5.066 3.2z"/></svg>
    </div>
    <div class="ctrl-btn pause">
      <svg viewBox="0 0 24 24"><rect x="7" y="5" width="3.5" height="14" rx="1"/><rect x="13.5" y="5" width="3.5" height="14" rx="1"/></svg>
    </div>
    <div class="ctrl-btn">
      <svg viewBox="0 0 24 24"><path d="M11.934 12.8L7 16V8l4.934 3.2L17 8v8l-5.066-3.2z"/></svg>
    </div>
  </div>

  <!-- Secondary controls -->
  <div class="secondary-controls">
    <div class="sec-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
      <span>Volume</span>
    </div>
    <div class="sec-btn">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6zM10 19a2 2 0 110-4 2 2 0 010 4z"/></svg>
      <span>Sounds</span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
</div>

<script>
// Generate particles
const container = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 2 + Math.random() * 4;
  p.style.setProperty('--size', size + 'px');
  p.style.setProperty('--x', Math.random() * 100 + '%');
  p.style.setProperty('--dur', 8 + Math.random() * 14 + 's');
  p.style.setProperty('--delay', Math.random() * -20 + 's');
  p.style.setProperty('--drift', (Math.random() - 0.5) * 60 + 'px');
  p.style.setProperty('--op', 0.15 + Math.random() * 0.35);
  container.appendChild(p);
}

// Breathing text sync
const textEl = document.getElementById('breathText');
const phases = [
  { text: 'Breathe In...', duration: 4000 },
  { text: 'Hold...', duration: 2000 },
  { text: 'Breathe Out...', duration: 4000 },
];
let phase = 0;
function cycleText() {
  textEl.textContent = phases[phase].text;
  const dur = phases[phase].duration;
  phase = (phase + 1) % phases.length;
  setTimeout(cycleText, dur);
}
cycleText();
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
