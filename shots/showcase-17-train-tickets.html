<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<title>Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1600px;
  height: 1200px;
  overflow: hidden;
  background: linear-gradient(145deg, #E8F0FF 0%, #C0D8FF 50%, #90B8FF 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* iPhone 15 Pro style mockup */
.iphone {
  position: relative;
  width: 380px;
  height: 780px;
  border-radius: 58px;
  background: #1C1C1E;
  padding: 14px;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.18), 0 16px 32px rgba(0,0,0,0.10),
    inset 0 0 0 0.5px rgba(255,255,255,0.3);
}

/* Titanium edge highlights */
.iphone::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 58px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.12) 0%,
    transparent 40%,
    transparent 60%,
    rgba(255,255,255,0.04) 100%
  );
  pointer-events: none;
  z-index: 5;
}

/* Side button - power */
.iphone::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 200px;
  width: 3px;
  height: 80px;
  border-radius: 0 3px 3px 0;
  background: #2A2A2C;
}

/* Volume buttons */
.vol-up, .vol-down, .action-btn {
  position: absolute;
  left: -3px;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: #2A2A2C;
}
.action-btn { top: 168px; height: 28px; }
.vol-up { top: 220px; height: 54px; }
.vol-down { top: 288px; height: 54px; }

/* Screen */
.screen {
  width: 100%;
  height: 100%;
  border-radius: 46px;
  overflow: hidden;
  position: relative;
  background: #000;
}

.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 36px;
  background: #000;
  border-radius: 24px;
  z-index: 10;
}

/* Status bar icons (subtle) */
.status-bar {
  position: absolute;
  top: 16px;
  left: 34px;
  right: 34px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 8;
  pointer-events: none;
}

/* Home indicator */
.home-indicator {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,0.25);
  z-index: 10;
}

/* Subtle reflection on screen */
.screen::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 46px;
  background: linear-gradient(
    165deg,
    rgba(255,255,255,0.06) 0%,
    transparent 30%
  );
  pointer-events: none;
  z-index: 6;
}

</style>
</head>
<body>

<div class="iphone">
  <div class="action-btn"></div>
  <div class="vol-up"></div>
  <div class="vol-down"></div>
  <div class="screen">
    <div class="dynamic-island"></div>
    <div class="home-indicator"></div>
    <img src="exports/images/shot-17-train-tickets.jpg" alt="App Screenshot" />
  </div>
</div>

</body>
</html>
