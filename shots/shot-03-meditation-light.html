<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Clarity - Light Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* macOS-like scrollbars */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.0);border-radius:3px;transition:background .3s}
  :hover::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.4)}
  *{scrollbar-width:thin;scrollbar-color:transparent transparent}
  *:hover{scrollbar-color:rgba(128,128,128,.25) transparent}

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ece6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #FEFDFB;
    position: relative;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px 28px 16px;
    position: relative;
    z-index: 2;
  }
  .close-btn {
    width: 36px; height: 36px;
    background: #E8DDD3;
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #5a4e42;
  }
  .streak {
    display: flex; align-items: center; gap: 6px;
    background: #E8DDD3;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: #5a4e42;
  }
  .streak i { color: #d4943a; }
  .session-info {
    text-align: center;
    padding: 10px 28px 0;
    position: relative;
    z-index: 2;
  }
  .session-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    color: #3a3228;
    letter-spacing: -0.5px;
  }
  .session-sub {
    font-size: 14px;
    color: #8a7e72;
    margin-top: 4px;
    font-weight: 400;
  }
  .breathing-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 380px;
  }
  .breath-circle {
    position: absolute;
    border-radius: 50%;
    animation: breathe 12s ease-in-out infinite;
  }
  .breath-c1 {
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(124,182,157,0.15), rgba(124,182,157,0.05));
    border: 1.5px solid rgba(124,182,157,0.2);
  }
  .breath-c2 {
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(181,213,226,0.2), rgba(181,213,226,0.08));
    border: 1.5px solid rgba(181,213,226,0.25);
    animation-delay: -0.5s;
  }
  .breath-c3 {
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(124,182,157,0.25), rgba(124,182,157,0.1));
    border: 1.5px solid rgba(124,182,157,0.3);
    animation-delay: -1s;
  }
  .breath-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: #5a7e6a;
    letter-spacing: 1px;
    z-index: 2;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    25% { transform: scale(1.25); opacity: 1; }
    50% { transform: scale(1.25); opacity: 0.9; }
    75% { transform: scale(1); opacity: 0.7; }
  }

  .particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: radial-gradient(circle, rgba(212,180,110,0.7), rgba(212,180,110,0));
    border-radius: 50%;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-500px) translateX(30px); opacity: 0; }
  }

  .timer {
    text-align: center;
    position: relative;
    z-index: 2;
    color: #3a3228;
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .progress-section {
    padding: 0 40px;
    position: relative;
    z-index: 2;
    margin-top: 8px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: #E8DDD3;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    width: 36.8%;
    height: 100%;
    background: linear-gradient(90deg, #7CB69D, #B5D5E2);
    border-radius: 2px;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 28px 0 0;
    position: relative;
    z-index: 2;
  }
  .ctrl-btn {
    background: none; border: none;
    color: #8a7e72;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn.main {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #7CB69D, #8dc4a8);
    border-radius: 50%;
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,182,157,0.3);
  }
  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 24px 0 50px;
    position: relative;
    z-index: 2;
  }
  .bottom-btn {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    background: none; border: none;
    color: #a89e92;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="particles" id="particles"></div>

  <div class="header">
    <button class="close-btn"><i data-lucide="x" style="width:18px;height:18px"></i></button>
    <div class="streak"><i data-lucide="flame" style="width:16px;height:16px"></i> Day 12</div>
  </div>

  <div class="session-info">
    <div class="session-name">Morning Clarity</div>
    <div class="session-sub">Focus & Breathe &middot; 10 min</div>
  </div>

  <div class="breathing-area">
    <div class="breath-circle breath-c1"></div>
    <div class="breath-circle breath-c2"></div>
    <div class="breath-circle breath-c3"></div>
    <div class="breath-text" id="breathText">Breathe In...</div>
  </div>

  <div class="timer">06:32</div>

  <div class="progress-section">
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn"><i data-lucide="skip-back" style="width:24px;height:24px"></i></button>
    <button class="ctrl-btn main"><i data-lucide="pause" style="width:28px;height:28px"></i></button>
    <button class="ctrl-btn"><i data-lucide="skip-forward" style="width:24px;height:24px"></i></button>
  </div>

  <div class="bottom-bar">
    <button class="bottom-btn"><i data-lucide="volume-2" style="width:20px;height:20px"></i>Sound</button>
    <button class="bottom-btn"><i data-lucide="music" style="width:20px;height:20px"></i>Music</button>
  </div>
</div>

<script>
  lucide.createIcons();

  // Breathing text sync
  const phases = ['Breathe In...', 'Hold...', 'Breathe Out...', 'Hold...'];
  const durations = [3000, 3000, 3000, 3000];
  let phase = 0;
  const breathText = document.getElementById('breathText');
  function cycle() {
    breathText.textContent = phases[phase];
    setTimeout(() => { phase = (phase + 1) % 4; cycle(); }, durations[phase]);
  }
  cycle();

  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = -10 + 'px';
    p.style.width = (3 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(p);
  }
</script>
</body>
</html>
