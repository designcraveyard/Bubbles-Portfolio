<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1600px;
  height: 1200px;
  overflow: hidden;
  background: linear-gradient(145deg, #E8FAF5 0%, #C2F0E0 40%, #A0E8D0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

/* macOS-style browser window */
.browser {
  width: 1200px;
  border-radius: 14px;
  background: #fff;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.12),
    0 16px 32px rgba(0,0,0,0.08),
    0 0 0 0.5px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* Title bar */
.chrome {
  height: 48px;
  background: #F6F6F6;
  border-bottom: 0.5px solid #E0E0E0;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 8px;
  position: relative;
}

.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.r { background: #FF5F57; }
.dot.y { background: #FEBC2E; }
.dot.g { background: #28C840; }

.urlbar {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  height: 28px;
  width: 380px;
  border-radius: 8px;
  background: #fff;
  border: 0.5px solid #D8D8D8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
}

.url {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 12px;
  color: #999;
}

/* Viewport */
.viewport {
  overflow: hidden;
  height: 720px;
}

.viewport img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}
</style>
</head>
<body>
<div class="browser">
  <div class="chrome">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="urlbar">
      <span class="url">emicalculator.app</span>
    </div>
  </div>
  <div class="viewport">
    <img src="exports/images/shot-09-emi-calculator-web.jpg" alt="EMI Calculator" />
  </div>
</div>
</body>
</html>
