<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Workout Session</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* macOS-like scrollbars */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.0);border-radius:3px;transition:background .3s}
  :hover::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.4)}
  *{scrollbar-width:thin;scrollbar-color:transparent transparent}
  *:hover{scrollbar-color:rgba(128,128,128,.25) transparent}

*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6B00;--black:#000000;--white:#FFFFFF;--dark:#111111;--rest-blue:#4A90D9}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.phone{width:390px;height:844px;background:var(--black);position:relative;overflow:hidden}

/* Top bar */
.top-bar{padding:54px 24px 0;display:flex;align-items:center;justify-content:space-between}
.session-info{font-size:13px;font-weight:500;letter-spacing:0.5px;opacity:0.7;transition:opacity 0.5s}
.pause-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.5s}
.pause-btn svg{fill:var(--white);transition:fill 0.5s}
.progress-track{margin:12px 24px 0;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:40%;background:var(--orange);border-radius:2px;transition:background 1s}

/* Figure */
.figure-container{display:flex;justify-content:center;margin-top:28px;position:relative}
.figure{position:relative;width:120px;height:140px;animation:heartbeat 1s ease-in-out infinite}
/* Head */
.fig-head{width:28px;height:28px;border-radius:50%;border:3px solid var(--orange);position:absolute;top:0;left:50%;transform:translateX(-50%);transition:border-color 1s}
/* Torso */
.fig-torso{width:3px;height:40px;background:var(--orange);position:absolute;top:26px;left:50%;transform:translateX(-50%);transition:background 1s}
/* Arms */
.fig-arm-l,.fig-arm-r{width:3px;height:30px;background:var(--orange);position:absolute;top:30px;transform-origin:top center;transition:background 1s}
.fig-arm-l{left:calc(50% - 2px);transform:rotate(40deg)}
.fig-arm-r{left:calc(50% - 2px);transform:rotate(-40deg)}
/* Hands holding weight */
.fig-weight{width:20px;height:20px;border:3px solid var(--orange);border-radius:4px;position:absolute;top:54px;left:50%;transform:translateX(-50%);transition:border-color 1s}
/* Upper legs - squat position */
.fig-leg-upper-l,.fig-leg-upper-r{width:3px;height:28px;background:var(--orange);position:absolute;top:66px;transform-origin:top center;transition:background 1s}
.fig-leg-upper-l{left:calc(50% - 14px);transform:rotate(-30deg)}
.fig-leg-upper-r{left:calc(50% + 12px);transform:rotate(30deg)}
/* Lower legs */
.fig-leg-lower-l,.fig-leg-lower-r{width:3px;height:30px;background:var(--orange);position:absolute;top:88px;transform-origin:top center;transition:background 1s}
.fig-leg-lower-l{left:calc(50% - 26px);transform:rotate(20deg)}
.fig-leg-lower-r{left:calc(50% + 24px);transform:rotate(-20deg)}
/* Feet */
.fig-foot-l,.fig-foot-r{width:16px;height:3px;background:var(--orange);position:absolute;top:118px;border-radius:1px;transition:background 1s}
.fig-foot-l{left:calc(50% - 32px)}
.fig-foot-r{left:calc(50% + 16px)}

@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.04)}
  30%{transform:scale(1)}
  45%{transform:scale(1.02)}
}

/* Exercise name */
.exercise-name{font-family:'Bebas Neue',sans-serif;font-size:52px;text-align:center;letter-spacing:4px;margin-top:16px;line-height:1;transition:color 0.5s}
.form-tip{text-align:center;font-size:12px;font-style:italic;color:var(--orange);margin-top:6px;letter-spacing:0.3px;opacity:0.9;transition:color 1s}

/* Timer ring */
.timer-container{display:flex;flex-direction:column;align-items:center;margin-top:24px;position:relative}
.timer-ring-wrap{position:relative;width:180px;height:180px}
.timer-ring-wrap svg{transform:rotate(-90deg);width:180px;height:180px}
.timer-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:6}
.timer-progress{fill:none;stroke:var(--orange);stroke-width:6;stroke-linecap:round;stroke-dasharray:502.65;stroke-dashoffset:0;transition:stroke 1s}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-digits{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;letter-spacing:1px;line-height:1}
.timer-label{font-size:11px;opacity:0.5;margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* Rep counter */
.rep-counter{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px}
.rep-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:transparent;color:var(--white);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Space Mono',monospace;transition:border-color 0.5s}
.rep-count{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px}

/* Next up card */
.next-card{margin:20px 24px 0;background:var(--dark);border-radius:16px;padding:16px 20px;transition:background 1s}
.next-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:0.4;margin-bottom:4px}
.next-rest{font-size:13px;color:var(--orange);font-weight:500;margin-bottom:6px;transition:color 1s}
.next-exercise{font-size:15px;font-weight:600;letter-spacing:0.3px}
.next-details{font-size:12px;opacity:0.5;margin-top:2px}

/* Fire emoji */
.fire{position:absolute;font-size:40px;opacity:0;pointer-events:none;z-index:99}
.fire-1{left:40%;bottom:200px}
.fire-2{left:55%;bottom:180px}
.fire-3{left:30%;bottom:220px}

/* Rest state */
.phone.rest-mode .timer-progress{stroke:var(--rest-blue)}
.phone.rest-mode .progress-fill{background:var(--rest-blue)}
.phone.rest-mode .form-tip{color:var(--rest-blue)}
.phone.rest-mode .next-rest{color:var(--rest-blue)}
.phone.rest-mode .fig-head,.phone.rest-mode .fig-weight{border-color:var(--rest-blue)}
.phone.rest-mode .fig-torso,.phone.rest-mode .fig-arm-l,.phone.rest-mode .fig-arm-r,
.phone.rest-mode .fig-leg-upper-l,.phone.rest-mode .fig-leg-upper-r,
.phone.rest-mode .fig-leg-lower-l,.phone.rest-mode .fig-leg-lower-r,
.phone.rest-mode .fig-foot-l,.phone.rest-mode .fig-foot-r{background:var(--rest-blue)}
.phone.rest-mode .figure{animation:none;opacity:0.4}
.phone.rest-mode .exercise-name{color:rgba(255,255,255,0.3)}

/* Rest overlay */
.rest-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.6s;z-index:50}
.rest-overlay.visible{opacity:1}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:6px;color:var(--rest-blue)}
.rest-sub{font-family:'Space Mono',monospace;font-size:14px;opacity:0.5;margin-top:4px}

@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(0.5)}
  20%{opacity:1;transform:translateY(-20px) scale(1)}
  100%{opacity:0;transform:translateY(-200px) scale(1.3)}
}
.fire.animate{animation:floatUp 2s ease-out forwards}

/* Countdown animation for timer ring - 45 seconds total, starts at 7s remaining = offset for 38/45 */
@keyframes deplete{
  0%{stroke-dashoffset:0}
  100%{stroke-dashoffset:502.65}
}
</style>
</head>
<body>
<div class="phone" id="phone">
  <!-- Top -->
  <div class="top-bar">
    <span class="session-info">Legs & Core &middot; Day 4 of 30</span>
    <div class="pause-btn">
      <svg width="12" height="14" viewBox="0 0 12 14"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill"></div></div>

  <!-- Figure -->
  <div class="figure-container">
    <div class="figure">
      <div class="fig-head"></div>
      <div class="fig-torso"></div>
      <div class="fig-arm-l"></div>
      <div class="fig-arm-r"></div>
      <div class="fig-weight"></div>
      <div class="fig-leg-upper-l"></div>
      <div class="fig-leg-upper-r"></div>
      <div class="fig-leg-lower-l"></div>
      <div class="fig-leg-lower-r"></div>
      <div class="fig-foot-l"></div>
      <div class="fig-foot-r"></div>
    </div>
  </div>

  <!-- Exercise -->
  <div class="exercise-name" id="exerciseName">GOBLET SQUAT</div>
  <div class="form-tip" id="formTip">Keep chest up, heels flat</div>

  <!-- Timer -->
  <div class="timer-container">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 180 180">
        <circle class="timer-bg" cx="90" cy="90" r="80"/>
        <circle class="timer-progress" id="timerRing" cx="90" cy="90" r="80"/>
      </svg>
      <div class="timer-text">
        <div class="timer-digits" id="timerDigits">00:38</div>
        <div class="timer-label" id="timerLabel">seconds left</div>
      </div>
    </div>
  </div>

  <!-- Reps -->
  <div class="rep-counter">
    <div class="rep-btn">&minus;</div>
    <div class="rep-count" id="repCount">8 REPS</div>
    <div class="rep-btn">+</div>
  </div>

  <!-- Next -->
  <div class="next-card">
    <div class="next-label">NEXT UP</div>
    <div class="next-rest">Rest 30s</div>
    <div class="next-exercise">Lunges</div>
    <div class="next-details">3 sets &middot; 12 reps</div>
  </div>

  <!-- Fire icons -->
  <div class="fire fire-1" id="fire1"><i data-lucide="flame" style="width:40px;height:40px;color:var(--orange)"></i></div>
  <div class="fire fire-2" id="fire2"><i data-lucide="flame" style="width:40px;height:40px;color:var(--orange)"></i></div>
  <div class="fire fire-3" id="fire3"><i data-lucide="flame" style="width:40px;height:40px;color:var(--orange)"></i></div>

  <!-- Rest overlay -->
  <div class="rest-overlay" id="restOverlay">
    <div class="rest-title">REST TIME</div>
    <div class="rest-sub">30 seconds</div>
  </div>
</div>

<script>
const totalTime = 45;
let currentTime = 38;
const circumference = 2 * Math.PI * 80; // 502.65
const ring = document.getElementById('timerRing');
const digits = document.getElementById('timerDigits');
const phone = document.getElementById('phone');
const restOverlay = document.getElementById('restOverlay');

// Set initial ring position (38/45 remaining = 7/45 depleted)
function updateRing(t) {
  const fraction = 1 - (t / totalTime);
  ring.style.strokeDashoffset = fraction * circumference;
}
updateRing(currentTime);

// Countdown
const interval = setInterval(() => {
  currentTime--;
  if (currentTime < 0) { clearInterval(interval); return; }

  const sec = currentTime.toString().padStart(2, '0');
  digits.textContent = '00:' + sec;
  updateRing(currentTime);

  // Transition at 0
  if (currentTime === 0) {
    triggerRest();
  }
}, 1000);

// Start timer depletion from current point
// 38 seconds to deplete over 38 real seconds
ring.style.transition = 'stroke-dashoffset 1s linear, stroke 1s';

function triggerRest() {
  // Fire emojis
  setTimeout(() => document.getElementById('fire1').classList.add('animate'), 0);
  setTimeout(() => document.getElementById('fire2').classList.add('animate'), 200);
  setTimeout(() => document.getElementById('fire3').classList.add('animate'), 400);

  // Rest mode
  setTimeout(() => {
    phone.classList.add('rest-mode');
    restOverlay.classList.add('visible');
    digits.textContent = '00:30';
    document.getElementById('timerLabel').textContent = 'rest';
    document.getElementById('exerciseName').textContent = 'GOBLET SQUAT';
    document.getElementById('formTip').textContent = 'Great set! Breathe deep.';
    updateRing(30);
    ring.style.stroke = '#4A90D9';
  }, 600);
}

// Speed up: transition happens at 7 seconds in (38 - 31 = 7s countdown)
// Actually let's trigger at real 7 seconds for the 12s recording
setTimeout(() => {
  currentTime = 1;
  digits.textContent = '00:01';
  updateRing(1);
}, 6000);

setTimeout(() => {
  currentTime = 0;
  digits.textContent = '00:00';
  updateRing(0);
  triggerRest();
  clearInterval(interval);
}, 7000);
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons()</script>
</body>
</html>
