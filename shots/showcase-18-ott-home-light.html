<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<title>OTT Home — Anjali Verma</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1600px;
  height: 1200px;
  overflow: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.showcase {
  width: 1600px;
  height: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 0 140px;
  gap: 80px;
}

.phone {
  width: 340px;
  height: 720px;
  border-radius: 44px;
  background: #000;
  padding: 12px;
  box-shadow:
    0 60px 120px rgba(0,0,0,0.3),
    0 20px 40px rgba(0,0,0,0.2),
    inset 0 0 0 1px rgba(255,255,255,0.1);
  position: relative;
  flex-shrink: 0;
}

.phone::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 28px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
}

.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: 34px;
  overflow: hidden;
  background: #f5f5f5;
}

.phone-screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

.info-panel {
  max-width: 480px;
  flex-shrink: 0;
}

.info-panel .category {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.6;
}

.info-panel h2 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 56px;
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

.info-panel .desc {
  font-size: 18px;
  line-height: 1.75;
  opacity: 0.7;
  font-weight: 300;
}

.info-panel .tags {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  flex-wrap: wrap;
}

.info-panel .tag {
  padding: 8px 18px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* Decorative */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  z-index: 0;
}
.deco-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid;
  z-index: 0;
}
.deco-dots {
  position: absolute;
  z-index: 0;
  display: grid;
  grid-template-columns: repeat(5, 6px);
  gap: 14px;
  opacity: 0.5;
}
.deco-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* Author badge */
.author {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 400;
  opacity: 0.5;
  z-index: 5;
  white-space: nowrap;
}
.author-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.4;
}

/* ===== THEME ===== */
.theme-ott { background: linear-gradient(145deg, #FFF5F5 0%, #FFE8E8 30%, #FFD5D5 70%, #FFC0C0 100%); color: #3D0D0D; }
.theme-ott .tag { background: rgba(200,30,30,0.1); color: #C81E1E; }
.theme-ott .deco-circle { background: rgba(200,40,40,0.08); }
.theme-ott .deco-ring { border-color: rgba(200,30,30,0.08); }
.theme-ott .deco-dots span { background: rgba(200,30,30,0.08); }

</style>
</head>
<body>
<div class="showcase theme-ott">
  <div class="deco-circle" style="top: -60px; left: -100px; width: 280px; height: 280px;"></div>
  <div class="deco-ring" style="bottom: 40px; right: -50px; width: 220px; height: 220px;"></div>
  <div class="deco-dots" style="top: 80px; right: 120px;">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  
    <div class="phone" style="transform: perspective(1200px) rotateY(-4deg) rotateX(4deg);">
      <div class="phone-screen">
        <img src="exports/images/shot-18-ott-home-light.jpg" alt="OTT Home" />
      </div>
    </div>
    <div class="info-panel">
      <p class="category">ENTERTAINMENT</p>
      <h2>OTT Home</h2>
      <p class="desc">A cinematic streaming platform with personalized recommendations, continue watching, and immersive content discovery.</p>
      <div class="tags">
        <span class="tag">Entertainment</span>
        <span class="tag">Streaming</span>
        <span class="tag">Dark UI</span>
      </div>
    </div>
  <div class="author">
    <span>Anjali Verma</span>
    <span class="author-dot"></span>
    <span>UX Designer</span>
  </div>
</div>
</body>
</html>
